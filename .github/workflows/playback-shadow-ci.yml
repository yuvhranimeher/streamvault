name: Playback Shadow CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playback-shadow:
    name: Read-only playback shadow gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.2
          cache: npm

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: 9.6.7
          cabal-version: 3.14.2.0

      - name: Install Node dependencies
        run: npm ci

      - name: Run playback shadow gates
        run: npm run test:playback-shadow
