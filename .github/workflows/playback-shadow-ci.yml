name: Playback Shadow CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playback-shadow:
    name: Read-only playback shadow gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.2
          cache: npm

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: 9.6.7
          cabal-update: false

      - name: Install Node dependencies
        run: npm ci

      - name: Run playback shadow gates
        run: npm run test:playback-shadow

      - name: Run playback shadow review pack
        run: npm run test:playback-shadow-review

      - name: Collect playback shadow artifacts
        run: python3 tools/playback-parity-v1/collect_playback_shadow_artifacts.py

      - name: Write playback shadow summary
        run: |
          {
            echo "## Playback Shadow Review Pack"
            echo ""
            echo "- CI gate: PASS"
            echo "- Review pack: PASS"
            echo "- Artifact bundle: playback-shadow-review-pack"
            echo "- Runtime safety: no server startup, no release job, no secrets, no PR comments"
            echo ""
            echo "Collected reports are in \`tools/playback-parity-v1/.playback-shadow-artifacts/\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload playback shadow review pack
        uses: actions/upload-artifact@v4
        with:
          name: playback-shadow-review-pack
          path: tools/playback-parity-v1/.playback-shadow-artifacts/
          if-no-files-found: error
